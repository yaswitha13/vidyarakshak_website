    <style>
        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;

            color: #3B82F6;
            font-size: 36px;

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => { 
            requireAuth('Teacher'); 
            loadProfile();
        });

        async function loadProfile() {
            try {
                const session = getSession();
                const res = await apiRequest('/get-teacher-profile?email=' + encodeURIComponent(session.email), 'GET');
                
                if (res && res.name) {
                    document.getElementById('name').value = res.name || '';
                    document.getElementById('sideName').textContent = res.name || 'Teacher';
                    
                    document.getElementById('email').value = res.email || session.email;
                    
                    if (res.name) {
                        document.getElementById('avatarInitial').textContent = res.name.charAt(0).toUpperCase();
                    }

                    document.getElementById('teacherId').value = res.teacher_id || '';
                    document.getElementById('schoolCode').value = res.school_code || '';
                    
                    document.getElementById('assignedClass').value = res.class_assigned || '';
                    document.getElementById('sideClass').textContent = res.class_assigned || '-';
                    
                    document.getElementById('phone').value = res.phone || '';
                    document.getElementById('gender').value = res.gender || 'Male';
                }
            } catch (e) {
                console.error(e);
                showAlert('alertMsg', 'Failed to load profile data.', 'error');
            }
        }

        async function handleProfileUpdate(e) {
            e.preventDefault();
            
            const nameVal = document.getElementById('name').value.trim();
            if (!/^[a-zA-Z\s]{3,}$/.test(nameVal)) {
                showAlert('alertMsg', 'Username (Name) must contain only letters, spaces, and be at least 3 characters long.', 'error');
                return;
            }

            const phoneVal = document.getElementById('phone').value.trim();
            const phoneRegex = /^[6-9]\d{9}$/;
            if (!phoneRegex.test(phoneVal)) {
                showAlert('alertMsg', 'The phone number should consist of 10 digits and start from 6 to 9.', 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Saving...';
            btn.disabled = true;

            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const gender = document.getElementById('gender').value;

            try {
                const session = getSession();
                const reqBody = {
                    old_email: session.email,
                    email: session.email, // email is locked
                    name,
                    phone,
                    gender
                };

                const response = await apiRequest('/update-teacher-profile', 'POST', reqBody);
                
                if (response.success) {
                    showAlert('alertMsg', 'Profile updated successfully!', 'success');
                    document.getElementById('sideName').textContent = name;
                    document.getElementById('avatarInitial').textContent = name.charAt(0).toUpperCase();

                    btn.textContent = 'Save Changes';
                    btn.disabled = false;
                } else {
                    showAlert('alertMsg', response.message || 'Failed to update profile.', 'error');
                    btn.textContent = 'Save Changes';
                    btn.disabled = false;
                }
            } catch (error) {
                showAlert('alertMsg', error.message || 'Server error.', 'error');
                btn.textContent = 'Save Changes';
                btn.disabled = false;
            }
        }
    
        function toggleEditForm() {
            const container = document.getElementById('editFormContainer');
            const chevron = document.getElementById('editChevron');
            if (container.style.display === 'none') {
                container.style.display = 'block';
                chevron.innerHTML = '<polyline points="18 15 12 9 6 15"></polyline>';
            } else {
                container.style.display = 'none';
                chevron.innerHTML = '<polyline points="9 18 15 12 9 6"></polyline>';
            }
        }
        function togglePasswordForm() {
            const container = document.getElementById('passwordFormContainer');
            const chevron = document.getElementById('passwordChevron');
            if (container.style.display === 'none') {
                container.style.display = 'block';
                chevron.innerHTML = '<polyline points="18 15 12 9 6 15"></polyline>';
            } else {
                container.style.display = 'none';
                chevron.innerHTML = '<polyline points="9 18 15 12 9 6"></polyline>';
            }
        }

        async function handleChangePassword(e) {
            e.preventDefault();
            const btn = document.getElementById('pwdSubmitBtn');
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;
            
            if (newPassword !== confirmNewPassword) {
                showAlert('alertMsg', 'New passwords do not match!', 'error');
                return;
            }

            const passwordPattern = /^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=!_]).{8,}$/;
            if (!passwordPattern.test(newPassword)) {
                showAlert('alertMsg', 'Password must be at least 8 characters long, include an uppercase letter, a lowercase letter, a number, and a special character.', 'error');
                return;
            }

            btn.textContent = 'Updating...';
            btn.disabled = true;

            try {
                const session = getSession();
                const reqBody = {
                    email: session.email,
                    role: session.role,
                    current_password: document.getElementById('currentPassword').value,
                    new_password: newPassword
                };

                const response = await apiRequest('/change-password', 'POST', reqBody);
                
                if (response.success || response.success === undefined) { 
                    showAlert('alertMsg', response.message || 'Password updated successfully!', 'success');
                    document.getElementById('passwordForm').reset();
                    togglePasswordForm();
                } else {
                    showAlert('alertMsg', response.message || 'Failed to update password.', 'error');
                }
            } catch (error) {
                showAlert('alertMsg', error.message || 'Server error.', 'error');
            } finally {
                btn.textContent = 'Update Password';
                btn.disabled = false;
            }
        }
        document.querySelectorAll('.toggle-pw').forEach(toggleBtn => {
            toggleBtn.addEventListener('click', function () {
                const targetInput = document.getElementById(this.getAttribute('data-target'));
                const type = targetInput.getAttribute('type') === 'password' ? 'text' : 'password';
                targetInput.setAttribute('type', type);
                this.classList.toggle('ri-eye-line');
                this.classList.toggle('ri-eye-off-line');
                this.style.color = type === 'text' ? 'var(--primary)' : '#94a3b8';
            });
        });

    </script>
</body>
</html>
