<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counseling - Vidhyarakshak</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.01);
            --card-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.06), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        .log-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 900px;
        }

        .log-card {
            background: white;
            border-radius: 20px;
            padding: 32px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(226, 232, 240, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .log-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-hover);
        }

        .log-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: var(--primary);
            opacity: 0.8;
        }

        .log-type-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #F1F5F9;
            color: #475569;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-completed { background: #DCFCE7; color: #166534; }
        .status-today { background: #DBEAFE; color: #1E40AF; }
        .status-upcoming { background: #F1F5F9; color: #475569; }

        .log-title {
            font-size: 20px;
            font-weight: 800;
            color: #0F172A;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .log-meta {
            font-size: 14px;
            color: #64748B;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .log-meta strong { color: #334155; }

        .log-sections {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .log-sections { grid-template-columns: 1fr 1fr; }
        }

        .section-box {
            background: #F8FAFC;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(226, 232, 240, 0.5);
        }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #94A3B8;
            margin-bottom: 8px;
            letter-spacing: 0.1em;
        }

        .section-content {
            font-size: 15px;
            color: #334155;
            line-height: 1.6;
        }

        .banner-status-tag {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 6px;
            display: block;
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            background: white;
            border-radius: 24px;
            border: 2px dashed #E2E8F0;
        }
    </style>
</head>
<body class="desktop-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header" style="display: flex; align-items: center; gap: 12px; padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px;">
            <div style="width: 44px; height: 44px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: white; flex-shrink: 0;"><img src="assets/logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; transform: scale(1.15);"></div>
            <div>
                <div class="sidebar-brand-title" style="margin-bottom: 2px;">VidyaRakshak</div>
                <div class="sidebar-brand-subtitle" style="margin: 0; font-size: 11px; letter-spacing: 0.5px;">Parent Portal</div>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="parent_dashboard.html" class="sidebar-item stroke-icon">
                <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                Dashboard
            </a>
            <a href="parent_alerts.html" class="sidebar-item stroke-icon">
                <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/></svg>
                Alerts
            </a>
            <a href="parent_counseling.html" class="sidebar-item active stroke-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                Counseling
            </a>
            <a href="parent_profile.html" class="sidebar-item stroke-icon">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                Profile
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <button class="sidebar-logout" onclick="clearSession()">
                <div style="background: rgba(239, 68, 68, 0.2); border-radius: 4px; padding: 4px; display:flex;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </div>
                Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        
        <div class="dashboard-header" style="margin-bottom: 32px;">
            <div>
                <h1 class="dashboard-title text-primary" style="font-size: 28px; font-weight: 800;">Counseling</h1>
                <p style="color: #64748B; margin-top: 6px; font-size: 15px;">Detailed sessions and professional feedback for your child.</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" style="height: 44px; border-radius: 10px; padding:0 20px; font-weight: 600;" onclick="fetchCounseling()">
                    <i class="ri-refresh-line" style="margin-right: 8px;"></i> Refresh
                </button>
            </div>
        </div>

        <!-- Next Counseling Date Banner -->
        <div id="webCounselingBanner" style="display: none; background: #2563EB; border-radius: 20px; padding: 28px; margin-bottom: 40px; color: white; max-width: 900px; align-items: center; justify-content: space-between; box-shadow: 0 20px 25px -5px rgba(37,99,235,0.15);">
            <div style="display: flex; align-items: center; gap: 24px;">
                <div style="width: 64px; height: 64px; border-radius: 16px; background: rgba(255,255,255,0.15); color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2);">
                    <i class="ri-calendar-todo-fill"></i>
                </div>
                <div>
                    <div style="font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.8; margin-bottom: 4px;">Upcoming Schedule</div>
                    <div id="webNextCounselingDate" style="font-size: 26px; font-weight: 800; letter-spacing: -0.02em;">--</div>
                    <span id="bannerStatusLabel" class="banner-status-tag">UPCOMING</span>
                </div>
            </div>
            <div style="text-align: right;">
                <div style="font-size: 13px; opacity: 0.7; font-weight: 500;">Next Counseling</div>
            </div>
        </div>

        <div id="alertMsg"></div>

        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
            <div style="width: 4px; height: 24px; background: var(--primary); border-radius: 2px;"></div>
            <h3 style="font-size: 18px; font-weight: 800; color: #1E293B;">Student Counseling History</h3>
        </div>
        
        <div class="log-list" id="logsContainer">
            <div style="padding: 40px; text-align: center;">
                <p class="text-muted">Loading counseling records...</p>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth('Parent');
            fetchCounseling();
        });

        async function fetchCounseling() {
            try {
                const session = getSession();
                const roll_no = session.email;
                const school_code = session.schoolCode;
                if (!school_code) throw new Error("Missing school code in session");
                
                const url = `/get-counseling?roll_no=${encodeURIComponent(roll_no)}&school_code=${encodeURIComponent(school_code)}`;
                const response = await apiRequest(url, 'GET');
                if (response) {
                    renderLogs(response);
                } else {
                    document.getElementById('logsContainer').innerHTML = `
                        <div class="empty-state">
                            <i class="ri-chat-history-line" style="font-size: 48px; color: #CBD5E1; margin-bottom: 16px;"></i>
                            <h3 style="color: #64748B; font-weight: 600;">No counseling records available</h3>
                            <p style="color: #94A3B8; margin-top: 8px;">Records will appear here once the teacher logs a session.</p>
                        </div>`;
                }
            } catch (error) {
                console.error(error);
                document.getElementById('logsContainer').innerHTML = `<p class="text-danger" style="color: var(--danger); padding:24px;">Failed to connect to backend.</p>`;
            }
        }

        function getStatus(dateStr) {
            if (!dateStr || dateStr === "null" || dateStr === "Pending" || dateStr === "None") return null;
            
            try {
                const parts = dateStr.split('/');
                if (parts.length !== 3) return null;
                
                const sessionDate = new Date(parts[2], parts[1] - 1, parts[0]);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                sessionDate.setHours(0, 0, 0, 0);
                
                if (sessionDate < today) {
                    return { text: "Completed", class: "status-completed", icon: "ri-checkbox-circle-fill", color: "#16a34a" };
                } else if (sessionDate.getTime() === today.getTime()) {
                    return { text: "Today", class: "status-today", icon: "ri-time-fill", color: "#2563eb" };
                } else {
                    return { text: "Upcoming", class: "status-upcoming", icon: "ri-calendar-line", color: "#64748b" };
                }
            } catch (e) {
                return null;
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('logsContainer');
            container.innerHTML = '';
            
            if(!logs || logs.length === 0) {
                document.getElementById('webCounselingBanner').style.display = 'none';
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="ri-chat-history-line" style="font-size: 48px; color: #CBD5E1; margin-bottom: 16px;"></i>
                        <h3 style="color: #64748B; font-weight: 600;">No counseling records available</h3>
                        <p style="color: #94A3B8; margin-top: 8px;">Records will appear here once the teacher logs a session.</p>
                    </div>`;
                return;
            }

            let latestFollowup = "";

            logs.forEach((log, index) => {
                const status = getStatus(log.session_date);
                
                if (!latestFollowup && log.followup_date && log.followup_date !== "null") {
                    latestFollowup = log.followup_date;
                }
                
                const card = document.createElement('div');
                card.className = "log-card";
                
                const statusHtml = status ? `
                    <span class="status-badge ${status.class}">
                        <i class="${status.icon}"></i> ${status.text}
                    </span>` : '';

                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
                        <span class="log-type-badge">${(log.counseling_type || 'General').toUpperCase()}</span>
                        ${statusHtml}
                    </div>
                    
                    <h4 class="log-title">${log.counseling_type || 'Student Counseling Session'}</h4>
                    <div class="log-meta">
                        <i class="ri-user-follow-line"></i> By <strong>${log.counselor_name || 'Class Teacher'}</strong>
                        <span style="color: #E2E8F0;">|</span>
                        <i class="ri-calendar-line"></i> ${log.session_date}
                    </div>

                    <div class="log-sections" style="margin-top: 24px;">
                        <div class="section-box">
                            <div class="section-label">Session Notes</div>
                            <div class="section-content">${log.notes || log.behavior_observation || 'No specific notes recorded.'}</div>
                        </div>
                        <div class="section-box">
                            <div class="section-label">Action Plan</div>
                            <div class="section-content">${log.action_plan || 'Regular monitoring recommended.'}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            
            if (latestFollowup) {
                const banner = document.getElementById('webCounselingBanner');
                const bannerStatus = getStatus(latestFollowup);
                banner.style.display = 'flex';
                document.getElementById('webNextCounselingDate').textContent = latestFollowup;
                
                const statusTag = document.getElementById('bannerStatusLabel');
                if (bannerStatus) {
                    statusTag.textContent = bannerStatus.text;
                    statusTag.style.color = 'white';
                    if (bannerStatus.text === "Today") {
                        banner.style.background = "#2563EB"; // Solid blue for today
                        banner.style.boxShadow = "0 20px 25px -5px rgba(37,99,235,0.25)";
                    } else if (bannerStatus.text === "Completed") {
                         banner.style.background = "#16A34A"; // Green for completed
                         banner.style.boxShadow = "0 20px 25px -5px rgba(22,163,74,0.15)";
                    }
                }
            } else {
                document.getElementById('webCounselingBanner').style.display = 'none';
            }
        }
    </script>
</body>
</html>
