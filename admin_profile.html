<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile - Vidhyarakshak</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
            align-items: flex-start;
        }

        .profile-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02), 0 2px 4px -1px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .avatar-section {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #EFF6FF;
            color: var(--primary);
            font-size: 48px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px auto;
            border: 4px solid white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .form-group label {
            font-weight: 500;
            color: #475569;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }

        .form-input {
            height: 48px;
            border-radius: 8px;
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
        }
        
        .form-input:focus {
            background: white;
            border-color: var(--primary);
        }

        .settings-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid var(--border);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 14px;
        }
        .stat-row:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body class="desktop-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header" style="display: flex; align-items: center; gap: 12px; padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px;">
            <div style="width: 44px; height: 44px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: white; flex-shrink: 0;"><img src="assets/logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; transform: scale(1.15);"></div>
            <div>
                <div class="sidebar-brand-title" style="margin-bottom: 2px;">VidyaRakshak</div>
                <div class="sidebar-brand-subtitle" style="margin: 0; font-size: 11px; letter-spacing: 0.5px;">Admin</div>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="admin_dashboard.html" class="sidebar-item stroke-icon">
                <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                Dashboard
            </a>
            <a href="admin_students.html" class="sidebar-item">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                Students
            </a>
            <a href="admin_teachers.html" class="sidebar-item stroke-icon">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                Teachers
            </a>
            <a href="admin_alerts.html" class="sidebar-item stroke-icon">
                <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/></svg>
                Alerts
            </a>
            <a href="admin_profile.html" class="sidebar-item active stroke-icon">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                My Profile
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <button class="sidebar-logout" onclick="clearSession()">
                <div style="background: rgba(239, 68, 68, 0.2); border-radius: 4px; padding: 4px; display:flex;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </div>
                Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        
        <div class="dashboard-header" style="margin-bottom: 32px;">
            <h1 class="dashboard-title">Profile Settings</h1>
        </div>

        <div id="alertMsg"></div>

        <div class="profile-container">
            
            <!-- Left Profile Card -->
            <div class="profile-card" style="text-align: center; display: flex; flex-direction: column; align-items: center; padding: 48px 24px;">
                <!-- App-like Squircle Avatar -->
                <div style="width: 120px; height: 120px; border-radius: 24px; border: 4px solid #3B82F6; padding: 6px; margin-bottom: 24px; background: white;">
                    <div style="width: 100%; height: 100%; background: #EFF6FF; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: #3B82F6;">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                </div>
                
                <h2 style="font-size: 24px; color:#1E293B; margin: 0 0 8px 0; font-weight: 800; line-height: 1.2;" id="sideName">Admin</h2>
                <div id="sideRole" style="color:#2563EB; font-weight: 700; font-size: 15px; margin-top: 8px;">Administrator</div>
            </div>

            <!-- Right Menu Architecture -->
            <div style="display: flex; flex-direction: column; gap: 24px;">
                
                <!-- Account -->
                <div>
                    <h3 style="font-size: 13px; font-weight: 700; color: #94A3B8; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 12px 16px;">ACCOUNT</h3>
                    <div class="profile-card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
                        <a href="admin_edit_profile.html" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid #F1F5F9; text-decoration: none; color: #1E293B; font-weight: 600; font-size: 16px; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#F8FAFC'" onmouseout="this.style.backgroundColor='transparent'">
                            <div style="display: flex; align-items: center; gap: 16px;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2.5"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                                Edit Profile
                            </div>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </a>
                        <a href="admin_change_password.html" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; text-decoration: none; color: #1E293B; font-weight: 600; font-size: 16px; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#F8FAFC'" onmouseout="this.style.backgroundColor='transparent'">
                            <div style="display: flex; align-items: center; gap: 16px;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                                Change Password
                            </div>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </a>
                    </div>
                </div>

                <!-- School / Management -->
                <div>
                    <h3 style="font-size: 13px; font-weight: 700; color: #94A3B8; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 12px 16px;">SCHOOL / MANAGEMENT</h3>
                    <div class="profile-card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
                        <a href="admin_teachers.html" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid #F1F5F9; text-decoration: none; color: #1E293B; font-weight: 600; font-size: 16px; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#F8FAFC'" onmouseout="this.style.backgroundColor='transparent'">
                            <div style="display: flex; align-items: center; gap: 16px;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                                Manage Teachers
                            </div>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </a>
                        <a href="admin_students.html" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; text-decoration: none; color: #1E293B; font-weight: 600; font-size: 16px; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#F8FAFC'" onmouseout="this.style.backgroundColor='transparent'">
                            <div style="display: flex; align-items: center; gap: 16px;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                                Manage Students
                            </div>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </a>
                    </div>
                </div>



                <!-- Information -->
                <div>
                    <h3 style="font-size: 13px; font-weight: 700; color: #94A3B8; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 12px 16px;">INFORMATION</h3>
                    <div class="profile-card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
                        <a href="admin_privacy_policy.html" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid #F1F5F9; text-decoration: none; color: #1E293B; font-weight: 600; font-size: 16px; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#F8FAFC'" onmouseout="this.style.backgroundColor='transparent'">
                            <div style="display: flex; align-items: center; gap: 16px;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                                Privacy Policy
                            </div>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </a>
                        <a href="admin_about_app.html" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; text-decoration: none; color: #1E293B; font-weight: 600; font-size: 16px; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#F8FAFC'" onmouseout="this.style.backgroundColor='transparent'">
                            <div style="display: flex; align-items: center; gap: 16px;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                                About App
                            </div>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </a>
                    </div>
                </div>

                <!-- Account Actions -->
                <div>
                    <h3 style="font-size: 13px; font-weight: 700; color: #94A3B8; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 12px 16px;">ACCOUNT ACTIONS</h3>
                    <div class="profile-card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
                        <a href="#" onclick="clearSession()" style="display: flex; justify-content: flex-start; align-items: center; gap: 16px; padding: 20px 24px; border-bottom: 1px solid #F1F5F9; text-decoration: none; color: #DC2626; font-weight: 600; font-size: 16px; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#FEF2F2'" onmouseout="this.style.backgroundColor='transparent'">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                            Logout
                        </a>
                    </div>
                </div>

            </div>

        </div>

    </main>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => { 
            const session = requireAuth('Admin');
            if(session && session.email) {
                try {
                    const profileData = await fetchAdminProfile(session.email);
                    if(profileData.name) {
                        document.getElementById('sideName').innerHTML = profileData.name;
                    }
                    if(profileData.role) {
                        document.getElementById('sideRole').innerText = profileData.role;
                    }
                } catch(error) {
                    console.log('Error loading dynamic profile data', error);
                }
            }
        });
    </script>
</body>
</html>
