<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password - Vidhyarakshak</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="text-center mb-6">
                <h2>Create New Password</h2>
                <p class="text-muted mt-4">Your new password must be unique from those previously used.</p>
            </div>
            
            <div id="alertMsg"></div>

            <form id="newPassForm" onsubmit="handleReset(event)">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <div style="position:relative;">
                        <input type="password" id="password" class="form-input" required placeholder="••••••••" style="padding-right: 50px;">
                        <i class="ri-eye-off-line toggle-pw" data-target="password" style="position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8; font-size: 1.2rem;"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div style="position:relative;">
                        <input type="password" id="confirmPassword" class="form-input" required placeholder="••••••••" style="padding-right: 50px;">
                        <i class="ri-eye-off-line toggle-pw" data-target="confirmPassword" style="position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8; font-size: 1.2rem;"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary mt-4" id="submitBtn">Reset Password</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        async function handleReset(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            
            if (pass !== confirmPass) {
                showAlert('alertMsg', 'Passwords do not match.', 'error');
                return;
            }

            const passwordPattern = /^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=!_]).{8,}$/;
            if (!passwordPattern.test(pass)) {
                showAlert('alertMsg', 'Password must be at least 8 characters long, include an uppercase letter, a lowercase letter, a number, and a special character.', 'error');
                return;
            }

            btn.textContent = 'Updating...';
            btn.disabled = true;

            const email = sessionStorage.getItem('resetEmail');
            const role = sessionStorage.getItem('resetRole');

            try {
                // Call exact /reset-password API endpoint
                const response = await apiRequest('/reset-password', 'POST', {
                    email, role, new_password: pass
                });
                
                if (response.success) {
                    showAlert('alertMsg', 'Password reset successfully!', 'success');
                    sessionStorage.removeItem('resetEmail');
                    sessionStorage.removeItem('resetRole');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    showAlert('alertMsg', response.message || 'Failed to update password.', 'error');
                    btn.textContent = 'Reset Password';
                    btn.disabled = false;
                }
            } catch (error) {
                showAlert('alertMsg', error.message || 'Server error updating password.', 'error');
                btn.textContent = 'Reset Password';
                btn.disabled = false;
            }
        }
        document.querySelectorAll('.toggle-pw').forEach(toggleBtn => {
            toggleBtn.addEventListener('click', function () {
                const targetInput = document.getElementById(this.getAttribute('data-target'));
                const type = targetInput.getAttribute('type') === 'password' ? 'text' : 'password';
                targetInput.setAttribute('type', type);
                this.classList.toggle('ri-eye-line');
                this.classList.toggle('ri-eye-off-line');
                this.style.color = type === 'text' ? 'var(--primary)' : '#94a3b8';
            });
        });
    </script>
</body>
</html>
