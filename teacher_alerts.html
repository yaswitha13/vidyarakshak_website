<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Emergency Alerts - Vidhyarakshak</title>
    <link rel='stylesheet' href='css/style.css'>
    <style>
        .alert-card {
            background: #FEF2F2;
            border: 1px solid #FCA5A5;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .alert-icon {
            font-size: 24px;
            background: #FEE2E2;
            color: #DC2626;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .alert-content h3 { color: #991B1B; margin-bottom: 8px; font-size: 18px; }
        .alert-content p { color: #B91C1C; font-size: 14px; margin-bottom: 12px; line-height: 1.5; }
        
        .alert-meta {
            font-size: 13px;
            color: #7F1D1D;
            display: flex;
            gap: 24px;
            font-weight: 500;
        }
    </style>
</head>
<body class='desktop-layout'>

    <!-- Sidebar -->
    <aside class='sidebar'>
        <div class='sidebar-header' style='display: flex; align-items: center; gap: 12px; padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px;'>
            <div style='width: 44px; height: 44px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: white; flex-shrink: 0;'><img src='assets/logo.png' alt='Logo' style='width: 100%; height: 100%; object-fit: cover; transform: scale(1.15);'></div>
            <div>
                <div class='sidebar-brand-title' style='margin-bottom: 2px;'>VidyaRakshak</div>
                <div class='sidebar-brand-subtitle' style='margin: 0; font-size: 11px; letter-spacing: 0.5px;'>Teacher Portal</div>
            </div>
        </div>
        
        <nav class='sidebar-nav'>
            <a href='teacher_dashboard.html' class='sidebar-item stroke-icon'>
                <svg viewBox='0 0 24 24'><path d='M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z'/></svg>
                Dashboard
            </a>
            <a href='teacher_students.html' class='sidebar-item stroke-icon'>
                <svg viewBox='0 0 24 24'><path d='M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z'/></svg>
                My Students
            </a>
            <a href='teacher_attendance.html' class='sidebar-item stroke-icon'>
                <svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><rect x='3' y='4' width='18' height='18' rx='2' ry='2'></rect><line x1='16' y1='2' x2='16' y2='6'></line><line x1='8' y1='2' x2='8' y2='6'></line><line x1='3' y1='10' x2='21' y2='10'></line></svg>
                Attendance
            </a>
            <a href='teacher_airisk.html' class='sidebar-item stroke-icon'>
                <svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6'></path></svg>
                AI Risk Analysis
            </a>
            <a href='teacher_alerts.html' class='sidebar-item active stroke-icon'>
                <svg viewBox='0 0 24 24'><path d='M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z'/></svg>
                Alerts
            </a>
            <a href='teacher_counseling.html' class='sidebar-item stroke-icon'>
                <svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z'></path></svg>
                Counseling
            </a>
            <a href='teacher_profile.html' class='sidebar-item stroke-icon'>
                <svg viewBox='0 0 24 24'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>
                Profile
            </a>
        </nav>
        
        <div class='sidebar-footer'>
            <button class='sidebar-logout' onclick='clearSession()'>
                <div style='background: rgba(239, 68, 68, 0.2); border-radius: 4px; padding: 4px; display:flex;'>
                    <svg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'>
                        <path d='M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4'></path>
                        <polyline points='16 17 21 12 16 7'></polyline>
                        <line x1='21' y1='12' x2='9' y2='12'></line>
                    </svg>
                </div>
                Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class='main-content' style='background-color: #F8FAFC; padding: 40px; min-height: 100vh;'>
        
        <div class='dashboard-header' style='margin-bottom: 32px; width: 100%;'>
            <div>
                <h1 class='dashboard-title' style='font-size: 26px; color: #1E293B; font-weight: 700; margin-bottom: 8px;'>Send New Alert</h1>
                <p style='color: #64748B; font-size: 15px;'>Broadcast critical updates to parents and administration</p>
            </div>
        </div>

        <div class='form-card' style='background: white; border-radius: 16px; padding: 32px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); border: 1px solid #F1F5F9; width: 100%; margin-bottom: 40px;'>
            <div id='alertMsg'></div>

            <form id='alertForm' onsubmit='handleSendAlert(event)'>
                
                <div style='display: flex; gap: 24px; margin-bottom: 24px;'>
                    <div style='flex: 1;'>
                        <label style='display: block; font-size: 14px; font-weight: 600; color: #64748B; margin-bottom: 8px;'>Student</label>
                        <select id='studentRoll' style='width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; outline: none; font-size: 15px; color: #1E293B; appearance: none;' required>
                            <option value='' disabled selected>Loading students...</option>
                        </select>
                    </div>
                    <div style='flex: 1;'>
                        <label style='display: block; font-size: 14px; font-weight: 600; color: #64748B; margin-bottom: 8px;'>Alert Type</label>
                        <select id='alertType' style='width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; outline: none; font-size: 15px; color: #1E293B; appearance: none;' required>
                            <option value='' disabled selected>Select Alert Type</option>
                            <option value='Attendance Warning'>Attendance Warning</option>
                            <option value='Behavioral Concern'>Behavioral Concern</option>
                            <option value='Academic Notice'>Academic Notice</option>
                            <option value='Health Emergency'>Health Emergency</option>
                            <option value='General Announcement'>General Announcement</option>
                        </select>
                    </div>
                    <div style='flex: 1;'>
                        <label style='display: block; font-size: 14px; font-weight: 600; color: #64748B; margin-bottom: 8px;'>Priority</label>
                        <select id='priority' style='width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; outline: none; font-size: 15px; color: #1E293B; appearance: none;' required>
                            <option value='' disabled selected>Select Priority</option>
                            <option value='Low'>Low</option>
                            <option value='Medium'>Medium</option>
                            <option value='High'>High</option>
                            <option value='Critical'>Critical</option>
                        </select>
                    </div>
                </div>

                <div style='margin-bottom: 24px;'>
                    <label style='display: block; font-size: 14px; font-weight: 600; color: #64748B; margin-bottom: 8px;'>Message</label>
                    <textarea id='message' placeholder='Type details for parents...' style='width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; outline: none; font-size: 15px; color: #1E293B; min-height: 120px; resize: vertical;' required></textarea>
                </div>

                <div style='display: flex; justify-content: flex-start; margin-top: 32px;'>
                    <button type='submit' id='submitBtn' style='padding: 16px 48px; background: #EF4444; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);'>
                        Send Alert
                    </button>
                </div>
            </form>
        </div>

        <div style='display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;'>
            <h2 style='font-size: 20px; color: #1E293B; font-weight: 700; margin: 0;'>Sent Alerts History</h2>
            <button class='btn btn-outline' style='height: 40px; border-radius: 8px; padding:0 16px; background: white;' onclick='fetchAlerts()'>Refresh History</button>
        </div>

        <div id='alertsContainer'>
            <p class='text-muted' style='text-align: center; color: #94A3B8; font-size: 15px;'>Loading history...</p>
        </div>

    </main>

    <script src='js/api.js'></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth('Teacher');
            fetchStudents();
            fetchAlerts();
        });

        async function fetchStudents() {
            console.log('fetchStudents: Initiating...');
            try {
                const session = getSession();
                if (!session.email || session.email === 'null') {
                    console.error('fetchStudents: No valid session.');
                    return;
                }

                const profileRes = await apiRequest('/get-teacher-profile?email=' + encodeURIComponent(session.email), 'GET');
                console.log('fetchStudents: Profile result:', profileRes);
                
                if (profileRes && profileRes.school_code && profileRes.class_assigned) {
                    const schoolCode = encodeURIComponent(profileRes.school_code);
                    const className = encodeURIComponent(profileRes.class_assigned);
                    
                    console.log(`fetchStudents: Fetching students for Class: ${profileRes.class_assigned}`);
                    const students = await apiRequest(`/get-students?school_code=${schoolCode}&class_name=${className}`, 'GET');
                    console.log('fetchStudents: Students from backend:', students);
                    
                    const studentSelect = document.getElementById('studentRoll');
                    studentSelect.addEventListener('change', () => fetchAlerts());
                    studentSelect.innerHTML = "<option value='' disabled selected>Select Student</option>";
                    
                    if (students && Array.isArray(students) && students.length > 0) {
                        students.sort((a, b) => a.name.localeCompare(b.name)).forEach(s => {
                            const option = document.createElement('option');
                            option.value = s.roll_no;
                            option.textContent = `${s.name} (${s.roll_no})`;
                            studentSelect.appendChild(option);
                        });
                    } else {
                        studentSelect.innerHTML = '<option value="" disabled selected>No students found</option>';
                    }
                } else {
                    console.warn('fetchStudents: Teacher profile has missing fields.');
                }
            } catch (e) {
                console.error('fetchStudents: Error:', e);
                const studentSelect = document.getElementById('studentRoll');
                studentSelect.innerHTML = '<option value="" disabled selected>Error loading students</option>';
            }
        }

        async function handleSendAlert(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Sending...';
            btn.disabled = true;

            const student_roll_no = document.getElementById('studentRoll').value;
            const alert_type = document.getElementById('alertType').value;
            const priority = document.getElementById('priority').value;
            const message = document.getElementById('message').value;

            try {
                const session = getSession();
                const profileRes = await apiRequest('/get-teacher-profile?email=' + encodeURIComponent(session.email), 'GET');
                
                if (!profileRes || !profileRes.school_code) throw new Error('Could not identify teacher school context.');

                const date = new Date().toISOString();

                // Build request to backend
                const reqBody = {
                    roll_number: student_roll_no,
                    school_code: profileRes.school_code,
                    alert_type: alert_type,
                    priority: priority,
                    alert_message: message, // mapped to Backend expected key
                    teacher_name: profileRes.name, // explicitly pass the teacher name
                    target_role: 'Parent' 
                };

                // Use the correct backend endpoint
                const response = await apiRequest('/api/alerts/send', 'POST', reqBody);
                
                if (response.message === 'Alert sent successfully' || response.success) {
                    showAlert('alertMsg', 'Alert sent successfully!', 'success');
                    document.getElementById('alertForm').reset();
                    fetchAlerts(); // Refresh history
                } else {
                    showAlert('alertMsg', response.message || 'Failed to send alert.', 'error');
                }
            } catch (error) {
                showAlert('alertMsg', error.message || 'Server error.', 'error');
            } finally {
                btn.textContent = 'Send Alert';
                btn.disabled = false;
            }
        }

        async function fetchAlerts() {
            try {
                const session = getSession();
                const profileRes = await apiRequest('/get-teacher-profile?email=' + encodeURIComponent(session.email), 'GET');
                
                if (profileRes && profileRes.name) {
                    const teacherName = encodeURIComponent(profileRes.name);
                    const className = encodeURIComponent(profileRes.class_assigned || '');
                    const schoolCode = encodeURIComponent(profileRes.school_code || '');
                    const studentRoll = document.getElementById('studentRoll').value;
                    
                    let url = `/api/alerts/teacher/${teacherName}?class_name=${className}&school_code=${schoolCode}`;
                    if (studentRoll) {
                        url += `&roll_no=${encodeURIComponent(studentRoll)}`;
                    }
                    
                    const alerts = await apiRequest(url, 'GET');
                    renderAlerts(alerts);
                }
            } catch (e) {
                console.error(e);
                document.getElementById('alertsContainer').innerHTML = `<p class='text-danger' style='color: #EF4444; padding:24px; background:white; border-radius:12px; border:1px solid #FCA5A5;'>Failed to connect to backend history.</p>`;
            }
        }

        function renderAlerts(alerts) {
            const container = document.getElementById('alertsContainer');
            container.innerHTML = '';
            
            if(!alerts || alerts.length === 0) {
                container.innerHTML = `
                    <div style='text-align:center; padding: 48px; background: white; border-radius: 12px; border: 1px solid #F1F5F9; margin-top: 16px;'>
                        <span style='font-size: 2rem; display:block; margin-bottom:12px;'>📭</span>
                        <h4 style='color: #64748B; font-size:16px; margin:0; font-weight: 500;'>No alerting history found.</h4>
                    </div>`;
                return;
            }

            alerts.forEach(alert => {
                const card = document.createElement('div');
                card.style.background = 'white';
                card.style.borderRadius = '12px';
                card.style.padding = '24px';
                card.style.marginBottom = '16px';
                card.style.border = '1px solid #F1F5F9';
                card.style.boxShadow = '0 1px 3px 0 rgba(0, 0, 0, 0.05)';
                
                // Mimicking the history card from the screenshot
                const dateStr = alert.date || 'Recently';
                
                card.innerHTML = `
                    <div style='font-size: 13px; color: #94A3B8; margin-bottom: 8px;'>${dateStr}</div>
                    <div style='font-size: 16px; font-weight: 700; color: #1E293B; margin-bottom: 4px;'>Student: ${alert.student_name || 'Unknown'} (Roll No: ${alert.roll_number})</div>
                    <div style='font-size: 14px; color: #64748B; margin-bottom: 12px;'>Type: <span style='font-weight: 600; color: #475569;'>${alert.alert_type}</span> • Priority: <span style='font-weight: 600; color: ${alert.priority === 'High' || alert.priority === 'Critical' ? '#EF4444' : '#EAB308'};'>${alert.priority}</span></div>
                    <div style='font-size: 15px; color: #334155; background: #F8FAFC; padding: 16px; border-radius: 8px; border: 1px solid #E2E8F0;'>
                        ${alert.message}
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
