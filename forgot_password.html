<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Forgot Password - Vidhyarakshak</title>
    <link rel='stylesheet' href='css/style.css'>
</head>
<body>
    <div class='auth-container'>
        <div class='auth-card glass-panel'>
            <div class='text-center mb-6'>
                <h2>Reset Password</h2>
                <p class='text-muted mt-4'>Enter your registered email address securely. We will email you a 6-digit OTP code to reset your password.</p>
            </div>
            
            <div id='alertMsg'></div>

            <form id='forgotForm' onsubmit='handleSendOtp(event)'>
                <div class='form-group'>
                    <label class='form-label'>Email Address</label>
                    <input type='email' id='email' class='form-input' required placeholder='Enter your email'>
                </div>

                <div class='form-group'>
                    <label class='form-label'>Account Role</label>
                    <select id='role' class='form-select' required>
                        <option value='Teacher'>Teacher</option>
                        <option value='Parent'>Parent</option>
                    </select>
                </div>

                <button type='submit' class='btn btn-primary mt-4' id='submitBtn'>Send OTP</button>
            </form>

            <div class='text-center mt-6'>
                <a href='index.html' class='text-sm' style='color: var(--text-muted); font-weight: 600; text-decoration: none;'>&larr; Back to Login</a>
            </div>
        </div>
    </div>

    <script src='js/api.js'></script>
    <script>
        async function handleSendOtp(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Sending OTP...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const role = document.getElementById('role').value;

            if (!email.includes('@') || !email.includes('.')) {
                showAlert('alertMsg', 'Please enter a valid email address containing '@'.', 'error');
                btn.textContent = 'Send OTP';
                btn.disabled = false;
                return;
            }

            try {
                // Endpoint is actually /api/forgot-password as per backend
                const response = await apiRequest('/api/forgot-password', 'POST', {
                    email, role
                });
                
                if (response && response.message) {
                    sessionStorage.setItem('resetEmail', email);
                    sessionStorage.setItem('resetRole', role);
                    showAlert('alertMsg', response.message, 'success');
                    setTimeout(() => {
                        window.location.href = 'verify_otp.html';
                    }, 1500);
                } else {
                    showAlert('alertMsg', 'Failed to send OTP. Please check your email.', 'error');
                    btn.textContent = 'Send OTP';
                    btn.disabled = false;
                }
            } catch (error) {
                const errorMsg = (error.status === 404) ? 'No account found with this email' : (error.message || 'Server error.');
                showAlert('alertMsg', errorMsg, 'error');
                btn.textContent = 'Send OTP';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
