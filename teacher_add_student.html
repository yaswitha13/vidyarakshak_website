<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Add Student - Vidhyarakshak</title>
    <link rel='stylesheet' href='css/style.css'>
    <style>
        .form-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02), 0 2px 4px -1px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.05);
            max-width: 900px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: 500;
            color: #475569;
        }

        .form-input, .form-select {
            height: 48px;
            border-radius: 8px;
        }
    </style>
</head>
<body class='desktop-layout'>

    <!-- Sidebar -->
    <aside class='sidebar'>
        <div class='sidebar-header' style='display: flex; align-items: center; gap: 12px; padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px;'>
            <div style='width: 44px; height: 44px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: white; flex-shrink: 0;'><img src='assets/logo.png' alt='Logo' style='width: 100%; height: 100%; object-fit: cover; transform: scale(1.15);'></div>
            <div>
                <div class='sidebar-brand-title' style='margin-bottom: 2px;'>VidyaRakshak</div>
                <div class='sidebar-brand-subtitle' style='margin: 0; font-size: 11px; letter-spacing: 0.5px;'>Teacher Portal</div>
            </div>
        </div>
        
        <nav class='sidebar-nav'>
            <a href='teacher_dashboard.html' class='sidebar-item stroke-icon'>
                <svg viewBox='0 0 24 24'><path d='M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z'/></svg>
                Dashboard
            </a>
            <a href='teacher_students.html' class='sidebar-item stroke-icon'>
                <svg viewBox='0 0 24 24'><path d='M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z'/></svg>
                My Students
            </a>
            <a href='teacher_attendance.html' class='sidebar-item stroke-icon'>
                <svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><rect x='3' y='4' width='18' height='18' rx='2' ry='2'></rect><line x1='16' y1='2' x2='16' y2='6'></line><line x1='8' y1='2' x2='8' y2='6'></line><line x1='3' y1='10' x2='21' y2='10'></line></svg>
                Attendance
            </a>
            <a href='teacher_airisk.html' class='sidebar-item stroke-icon'>
                <svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6'></path></svg>
                AI Risk Analysis
            </a>
            <a href='teacher_alerts.html' class='sidebar-item stroke-icon'>
                <svg viewBox='0 0 24 24'><path d='M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z'/></svg>
                Alerts
            </a>
            <a href='teacher_counseling.html' class='sidebar-item stroke-icon'>
                <svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z'></path></svg>
                Counseling
            </a>
            <a href='teacher_profile.html' class='sidebar-item stroke-icon'>
                <svg viewBox='0 0 24 24'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>
                Profile
            </a>
        </nav>
        
        <div class='sidebar-footer'>
            <button class='sidebar-logout' onclick='clearSession()'>
                <div style='background: rgba(239, 68, 68, 0.2); border-radius: 4px; padding: 4px; display:flex;'>
                    <svg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'>
                        <path d='M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4'></path>
                        <polyline points='16 17 21 12 16 7'></polyline>
                        <line x1='21' y1='12' x2='9' y2='12'></line>
                    </svg>
                </div>
                Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class='main-content'>
        
        <div class='dashboard-header' style='margin-bottom: 32px;'>
            <a href='teacher_dashboard.html' class='action-link' style='display:inline-block; margin-bottom: 12px; color: var(--text-muted); text-decoration: none;'>&larr; Back to Dashboard</a>
            <h1 class='dashboard-title'>Add New Student</h1>
        </div>

        <div class='form-card'>
            <div id='alertMsg'></div>

            <form id='addStudentForm' onsubmit='handleAddStudent(event)' novalidate>
                <h3 style='margin-bottom: 16px; color: #1E293B; font-weight: 700;'>Student Details</h3>
                <div class='form-grid'>
                    <div class='form-group'>
                        <label class='form-label'>Full Name *</label>
                        <input type='text' id='name' class='form-input' required placeholder='Student Name'>
                        <small class='error-text' id='nameError'></small>
                    </div>
                    <div class='form-group'>
                        <label class='form-label'>Roll Number *</label>
                        <input type='text' id='rollNumber' class='form-input' required placeholder='Ex: 101'>
                        <small class='error-text' id='rollNumberError'></small>
                    </div>
                    <div class='form-group'>
                        <label class='form-label'>Class *</label>
                        <input type='text' id='className' class='form-input' required placeholder='Ex: 8'>
                        <small class='error-text' id='classNameError'></small>
                    </div>
                    <div class='form-group'>
                        <label class='form-label'>Date of Birth *</label>
                        <input type='date' id='dob' class='form-input' required>
                        <small class='error-text' id='dobError'></small>
                    </div>
                    <div class='form-group'>
                        <label class='form-label'>Gender *</label>
                        <select id='gender' class='form-select' required style='padding: 0 12px;'>
                            <option value="'>Select Gender</option>
                            <option value='Male'>Male</option>
                            <option value='Female'>Female</option>
                        </select>
                        <small class='error-text' id='genderError'></small>
                    </div>
                </div>

                <hr style='margin: 24px 0; border: none; border-top: 1px solid #E2E8F0;'>
                <h3 style='margin-bottom: 16px; color: #1E293B; font-weight: 700;'>Parent/Guardian Details</h3>
                
                <div class='form-grid'>
                    <div class='form-group'>
                        <label class='form-label'>Parent/Guardian Name *</label>
                        <input type='text' id='parentName' class='form-input' required placeholder='Enter parent/guardian name'>
                        <small class='error-text' id='parentNameError'></small>
                    </div>
                    <div class='form-group'>
                        <label class='form-label'>Parent Phone *</label>
                        <input type='text' id='parentPhone' class='form-input' required placeholder='Enter phone number'>
                        <small class='error-text' id='parentPhoneError'></small>
                    </div>
                    <div class='form-group' style='grid-column: span 2;' id='emailContainer'>
                        <label class='form-label'>Parent Email</label>
                        <input type='email' id='parentEmail' class='form-input' placeholder='Enter email address (optional)'>
                        <small class='error-text' id='parentEmailError'></small>
                    </div>
                </div>

                <hr style='margin: 24px 0; border: none; border-top: 1px solid #E2E8F0;'>
                <h3 style='margin-bottom: 16px; color: #1E293B; font-weight: 700;'>Family Information</h3>

                <div class='form-group' style='margin-bottom: 20px;'>
                    <label class='form-label'>Address *</label>
                    <textarea id='address' class='form-input' rows='3' style='height:auto; padding: 12px; border-radius: 8px; border: 1px solid #E2E8F0;' placeholder='Enter complete address' required></textarea>
                    <small class='error-text' id='addressError'></small>
                </div>

                <div class='form-grid'>
                    <div class='form-group'>
                        <label class='form-label'>Annual Family Income *</label>
                        <input type='text' id='familyIncome' class='form-input' placeholder='e.g., Below ₹50,000/year' required>
                        <small class='error-text' id='familyIncomeError'></small>
                    </div>
                    <div class='form-group'>
                        <label class='form-label'>Number of Siblings</label>
                        <input type='number' id='numSiblings' class='form-input' value='0' min='0'>
                        <small class='error-text' id='numSiblingsError'></small>
                    </div>
                    <div class='form-group'>
                        <label class='form-label'>Father's Occupation</label>
                        <input type='text' id='parentsOcc' class='form-input' placeholder='Enter occupation'>
                        <small class='error-text' id='parentsOccError'></small>
                    </div>
                </div>

                <div style='display: flex; gap: 16px; margin-top: 32px; justify-content: flex-end;'>
                    <a href='teacher_students.html' class='btn' style='background: white; border: 1px solid #CBD5E1; color: #475569; padding: 0 32px; height: 48px; border-radius: 8px; text-decoration: none; display: flex; align-items: center; justify-content: center;'>Cancel</a>
                    <button type='submit' class='btn btn-primary' id='submitBtn' style='padding: 0 32px; height: 48px; border-radius: 8px; width: auto;'>Add Student</button>
                </div>
            </form>
        </div>
    </main>

    <style>
        .error-text {
            color: #EF4444;
            font-size: 11px;
            margin-top: 4px;
            display: none;
            font-weight: 500;
        }
        .form-input.is-invalid, .form-select.is-invalid {
            border-color: #EF4444 !important;
            background-color: #FEF2F2 !important;
        }
        .form-input.is-valid, .form-select.is-valid {
            border-color: #10B981 !important;
            background-color: #F0FDF4 !important;
        }
        .form-group.is-invalid .error-text {
            display: block;
        }
    </style>

    <script src='js/api.js'></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => { 
            requireAuth('Teacher'); 
            
            const validationRules = {
                'name': { type: 'name', msg: 'Please enter a valid full name (min 3 chars, letters only)' },
                'parentName': { type: 'name', msg: 'Please enter a valid parent name (min 3 chars, letters only)' },
                'parentPhone': { type: 'phone', msg: 'Please enter a valid 10-digit phone number starting with 6-9' },
                'parentEmail': { type: 'email', msg: 'Please enter a valid email address' },
                'rollNumber': { type: 'required', msg: 'Roll number is required' },
                'className': { type: 'required', msg: 'Class is required' },
                'dob': { type: 'required', msg: 'Date of birth is required' },
                'gender': { type: 'required', msg: 'Please select a gender' },
                'address': { type: 'required', msg: 'Address is required' },
                'familyIncome': { type: 'required', msg: 'Family income is required' }
            };

            // Custom validation logic
            Object.keys(validationRules).forEach(id => {
                const input = document.getElementById(id);
                if (!input) return;

                const rule = validationRules[id];
                const errorEl = document.getElementById(id + 'Error');

                const validate = () => {
                    const val = input.value.trim();
                    if (val === '' && id === 'parentEmail') {
                        input.classList.remove('is-invalid', 'is-valid');
                        input.parentElement.classList.remove('is-invalid', 'is-valid');
                        if (errorEl) errorEl.style.display = 'none';
                        return true;
                    }

                    if (val === '') {
                        input.classList.remove('is-invalid', 'is-valid');
                        input.parentElement.classList.remove('is-invalid', 'is-valid');
                        if (errorEl) errorEl.style.display = 'none';
                        return false;
                    }

                    const isValid = Validator[rule.type](val);
                    
                    // Extra check for DOB
                    if (id === 'dob' && isValid) {
                        const dobDate = new Date(val);
                        if (dobDate > new Date()) {
                            setError(input, errorEl, 'Date of birth cannot be in the future');
                            return false;
                        }
                    }

                    if (isValid) {
                        setValid(input, errorEl);
                    } else {
                        setError(input, errorEl, rule.msg);
                    }
                    return isValid;
                };

                input.addEventListener('input', validate);
                input.addEventListener('blur', validate);
            });

            function setError(input, errorEl, msg) {
                input.classList.add('is-invalid');
                input.classList.remove('is-valid');
                input.parentElement.classList.add('is-invalid');
                input.parentElement.classList.remove('is-valid');
                if (errorEl) {
                    errorEl.textContent = msg;
                    errorEl.style.display = 'block';
                }
            }

            function setValid(input, errorEl) {
                input.classList.remove('is-invalid');
                input.classList.add('is-valid');
                input.parentElement.classList.remove('is-invalid');
                input.parentElement.classList.add('is-valid');
                if (errorEl) errorEl.style.display = 'none';
            }

            // Check URL for roll_no and auto-trigger fetch
            const urlParams = new URLSearchParams(window.location.search);
            const rollParam = urlParams.get('roll_no');
            if (rollParam) {
                const rollInput = document.getElementById('rollNumber');
                rollInput.value = rollParam;
                setTimeout(() => {
                    rollInput.dispatchEvent(new Event('blur'));
                }, 100);
            }

            // Auto-fetch student data when roll number field loses focus
            document.getElementById('rollNumber').addEventListener('blur', async function() {
                const rollVal = this.value.trim();
                if (!rollVal) return;
                
                try {
                    const session = getSession();
                    const profileRes = await apiRequest('/get-teacher-profile?email=' + encodeURIComponent(session.email), 'GET');
                    const res = await apiRequest(`/get-students?school_code=${encodeURIComponent(profileRes.school_code)}&class_name=${encodeURIComponent(profileRes.class_assigned)}`, 'GET');
                    const existingStudent = res.find(s => s.roll_no === rollVal || s.roll_number === rollVal || s.roll_no == rollVal);
                    
                    if (existingStudent) {
                        document.getElementById('name').value = existingStudent.name || '';
                        document.getElementById('className').value = existingStudent.class_name || '';
                        if (existingStudent.gender) document.getElementById('gender').value = existingStudent.gender;
                        
                        // Handle date format if needed
                        if (existingStudent.dob) {
                            if (existingStudent.dob.includes('/')) {
                                const parts = existingStudent.dob.split('/');
                                document.getElementById('dob').value = `${parts[2]}-${parts[1]}-${parts[0]}`;
                            } else {
                                document.getElementById('dob').value = existingStudent.dob;
                            }
                        }
                        
                        document.getElementById('parentName').value = existingStudent.parent_name || '';
                        document.getElementById('parentPhone').value = existingStudent.mobile_number || '';
                        document.getElementById('parentEmail').value = existingStudent.parent_email || '';
                        
                        document.getElementById('address').value = existingStudent.address || '';
                        document.getElementById('familyIncome').value = existingStudent.family_income || '';
                        document.getElementById('numSiblings').value = existingStudent.num_siblings || 0;
                        document.getElementById('parentsOcc').value = existingStudent.parents_occ || '';
                        

                        // Trigger re-validation
                        Object.keys(validationRules).forEach(id => {
                            const el = document.getElementById(id);
                            if (el) el.dispatchEvent(new Event('input'));
                        });

                        window.isEditMode = true;
                        document.getElementById('submitBtn').textContent = 'Update Student';
                        showAlert('alertMsg', `Existing data found for Roll No ${rollVal}. Form pre-filled.`, 'success');
                    }
                } catch (err) {
                    console.log('No existing student data found or fetch error:', err);
                }
            });
        });

        async function handleAddStudent(e) {
            e.preventDefault();
            
            const fieldIds = ['name', 'rollNumber', 'className', 'dob', 'gender', 'parentName', 'parentPhone', 'address', 'familyIncome'];
            let isValidForm = true;

            // Trigger validation for all fields
            fieldIds.forEach(id => {
                const el = document.getElementById(id);
                el.dispatchEvent(new Event('blur'));
                if (el.classList.contains('is-invalid')) isValidForm = false;
                if (!el.value.trim() && id !== 'parentEmail') isValidForm = false;
            });

            if (!isValidForm) {
                showAlert('alertMsg', 'Please fix the errors in the form before submitting.', 'error');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;
            btn.textContent = 'Saving...';
            btn.disabled = true;

            try {
                const session = getSession();
                const profileRes = await apiRequest('/get-teacher-profile?email=' + encodeURIComponent(session.email), 'GET');
                if (!profileRes || !profileRes.school_code) throw new Error('Could not identify teacher school context.');

                // Format DOB back to dd/mm/yyyy for backend consistency if required
                let dobVal = document.getElementById('dob').value;
                if (dobVal.includes('-')) {
                    const parts = dobVal.split('-');
                    dobVal = `${parts[2]}/${parts[1]}/${parts[0]}`;
                }

                const reqBody = {
                    name: document.getElementById('name').value,
                    roll_no: document.getElementById('rollNumber').value,
                    class_name: document.getElementById('className').value,
                    dob: dobVal,
                    gender: document.getElementById('gender').value,
                    parent_name: document.getElementById('parentName').value,
                    mobile_number: document.getElementById('parentPhone').value,
                    parent_email: document.getElementById('parentEmail').value,
                    address: document.getElementById('address').value,
                    family_income: document.getElementById('familyIncome').value,
                    num_siblings: document.getElementById('numSiblings').value,
                    parents_occ: document.getElementById('parentsOcc').value,
                    school_code: profileRes.school_code
                };

                const endpoint = window.isEditMode ? '/update-student' : '/add-student';
                const response = await apiRequest(endpoint, 'POST', reqBody);
                
                if (response.success || response.message) {
                    showAlert('alertMsg', window.isEditMode ? 'Student updated successfully!' : 'Student details stored successfully', 'success');
                    setTimeout(() => { window.location.href = 'teacher_students.html'; }, 1500);
                } else {
                    showAlert('alertMsg', response.message || 'Failed to save student.', 'error');
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                showAlert('alertMsg', error.message || 'Server error.', 'error');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
