<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>VidyaRakshak - Verify OTP</title>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap' rel='stylesheet'>
    <link href='https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css' rel='stylesheet'>
    <link rel='stylesheet' href='css/style.css'>
    <style>
        :root { 
            --primary: #2563EB; 
            --primary-dark: #1D4ED8; 
            --text-main: #0F172A; 
            --font-main: 'Plus Jakarta Sans', sans-serif; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
        body { 
            display: flex; 
            min-height: 100vh; 
            background-color: #ffffff; 
            color: var(--text-main); 
            align-items: stretch; 
            justify-content: stretch; 
            padding: 0; 
            margin: 0; 
            overflow-y: auto; 
            overflow-x: hidden; 
        }
        
        .auth-container { 
            display: flex; 
            width: 100%; 
            min-height: 100vh; 
            background: #ffffff; 
            overflow: hidden; 
            position: relative; 
        }
        
        .auth-visual { 
            width: 45%; 
            background: linear-gradient(135deg, #F0FDF4 0%, #DCFCE7 100%); 
            padding: 50px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            position: relative; 
            overflow: hidden; 
        }
        .auth-visual::before { content: ''; position: absolute; top: -20%; left: -20%; width: 300px; height: 300px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; filter: blur(50px); }
        .auth-visual::after { content: ''; position: absolute; bottom: -10%; right: -10%; width: 250px; height: 250px; background: rgba(16, 185, 129, 0.15); border-radius: 50%; filter: blur(40px); }
        
        .visual-content { position: relative; z-index: 10; }
        
        .brand-header { display: flex; align-items: center; gap: 14px; margin-bottom: 50px; }
        .brand-logo-glow { width: 56px; height: 56px; border-radius: 50%; background: white; padding: 4px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.15); display:flex; align-items:center; justify-content:center; }
        .brand-logo-glow img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .brand-text h1 { font-size: 24px; font-weight: 800; color: #1E293B; letter-spacing: -0.5px; line-height: 1.1; margin-bottom: 2px;}
        .brand-text p { color: #64748B; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .hero-statement h2 { font-size: 34px; font-weight: 800; line-height: 1.2; margin-bottom: 16px; color: #0F172A; letter-spacing: -1px; }
        .hero-statement h2 span { color: #10B981; }
        .hero-statement p { font-size: 16px; color: #475569; line-height: 1.6; font-weight: 500;}
        
        .illustration { margin-top: auto; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .illustration i { font-size: 120px; color: rgba(16, 185, 129, 0.2); }
        
        .auth-form-wrapper { width: 55%; padding: 40px 10%; position: relative; display: flex; flex-direction: column; justify-content: center; }
        
        .back-link { position: absolute; top: 30px; right: 40px; display: flex; align-items: center; gap: 6px; color: #64748B; text-decoration: none; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .back-link:hover { color: var(--primary); transform: translateX(-4px); }
        
        .form-title { margin-bottom: 36px; margin-top: 20px;}
        .form-title h2 { font-size: 30px; font-weight: 800; margin-bottom: 8px; color: #0F172A; letter-spacing: -0.5px; }
        .form-title p { font-size: 15px; color: #64748B; font-weight: 500; }
        
        .otp-container { display: flex; gap: 12px; justify-content: center; margin: 30px 0; }
        .otp-input { width: 50px; height: 60px; text-align: center; font-size: 24px; font-weight: 800; border: 1.5px solid #E2E8F0; border-radius: 12px; background-color: #ffffff; transition: 0.3s; color: var(--text-main); }
        .otp-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); transform: translateY(-2px); }
        
        .btn-submit { width: 100%; height: 52px; margin-top: 10px; background: var(--primary); color: white; font-size: 16px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-submit:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3); }
        
        #alertMsg { border-radius: 10px; margin-bottom: 20px; padding: 12px 16px; font-size: 14px; font-weight: 500; }
        
        @media (max-width: 900px) { 
            .auth-container { flex-direction: column; } 
            .auth-visual { display: none; } 
            .auth-form-wrapper { width: 100%; padding: 40px 30px; } 
            .otp-input { width: 40px; height: 50px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class='auth-container'>
        <div class='auth-visual'>
            <div class='visual-content'>
                <div class='brand-header'>
                    <div class='brand-logo-glow'><img src='assets/logo.png' alt='Logo'></div>
                    <div class='brand-text'><h1>VidyaRakshak</h1><p>Protecting Education</p></div>
                </div>
                <div class='hero-statement'>
                    <h2>Identity<br><span>Verification Hub</span></h2>
                    <p>Protecting your account security with multi-factor authentication. Please verify your OTP to proceed.</p>
                </div>
            </div>
            <div class='illustration'>
                <i class='ri-shield-flash-fill'></i>
            </div>
        </div>
        
        <div class='auth-form-wrapper'>
            <a href='index.html' class='back-link'><i class='ri-arrow-left-line'></i> Back to Portal</a>
            
            <div class='form-title'>
                <h2>Verification</h2>
                <p>Enter the 6-digit code sent to your email.</p>
            </div>
            
            <div id='alertMsg'></div>
            
            <form id='otpForm' onsubmit='handleVerify(event)'>
                <div class='otp-container' id='otpGroup'>
                    <input type='text' class='otp-input' maxlength='1' required data-index='1'>
                    <input type='text' class='otp-input' maxlength='1' required data-index='2'>
                    <input type='text' class='otp-input' maxlength='1' required data-index='3'>
                    <input type='text' class='otp-input' maxlength='1' required data-index='4'>
                    <input type='text' class='otp-input' maxlength='1' required data-index='5'>
                    <input type='text' class='otp-input' maxlength='1' required data-index='6'>
                </div>

                <button type='submit' class='btn-submit' id='submitBtn'>
                    Verify Code
                </button>
            </form>
        </div>
    </div>

    <script src='js/api.js'></script>
    <script>
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        async function handleVerify(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = 'Verifying... <i class="ri-loader-4-line ri-spin"></i>';
            btn.disabled = true;

            const email = sessionStorage.getItem('resetEmail');
            let otp = '';
            inputs.forEach(input => otp += input.value);

            try {
                const response = await apiRequest('/verify-otp', 'POST', { email, otp });
                if (response.success) {
                    showAlert('alertMsg', 'Code verified successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = 'new_password.html';
                    }, 1000);
                }
            } catch (error) {
                showAlert('alertMsg', error.message || 'Invalid or expired code.', 'error');
                btn.innerHTML = 'Verify Code';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
