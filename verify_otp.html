<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Verify OTP - Vidhyarakshak</title>
    <link rel='stylesheet' href='css/style.css'>
    <style>
        .otp-container {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1.5rem 0;
        }
        .otp-input {
            width: 45px;
            height: 55px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background-color: #F8FAFC;
        }
        .otp-input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--surface);
        }
    </style>
</head>
<body>
    <div class='auth-container'>
        <div class='auth-card glass-panel'>
            <div class='text-center mb-6'>
                <h2>OTP Verification</h2>
                <p class='text-muted mt-4'>Enter the 6-digit OTP code sent to your email.</p>
            </div>
            
            <div id='alertMsg'></div>

            <form id='otpForm' onsubmit='handleVerify(event)'>
                <div class='otp-container' id='otpGroup'>
                    <input type='text' class='otp-input' maxlength='1' required data-index='1'>
                    <input type='text' class='otp-input' maxlength='1' required data-index='2'>
                    <input type='text' class='otp-input' maxlength='1' required data-index='3'>
                    <input type='text' class='otp-input' maxlength='1' required data-index='4'>
                    <input type='text' class='otp-input' maxlength='1' required data-index='5'>
                    <input type='text' class='otp-input' maxlength='1' required data-index='6'>
                </div>

                <button type='submit' class='btn btn-primary mt-4' id='submitBtn'>Verify</button>
            </form>

            <div class='text-center mt-6'>
                <a href='index.html' class='text-sm' style='color: var(--text-muted); font-weight: 600; text-decoration: none;'>Back to Login</a>
            </div>
        </div>
    </div>

    <script src='js/api.js'></script>
    <script>
        // Setup Auto-Advance for OTP Box logic parity with Android VerifyOtpActivity
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        async function handleVerify(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Verifying...';
            btn.disabled = true;

            const email = sessionStorage.getItem('resetEmail');
            let otp = '';
            inputs.forEach(input => otp += input.value);

            if (otp.length !== 6) {
                showAlert('alertMsg', 'Please enter a valid 6-digit OTP', 'error');
                btn.textContent = 'Verify';
                btn.disabled = false;
                return;
            }

            try {
                // Call exact /verify-otp API endpoint
                const response = await apiRequest('/verify-otp', 'POST', {
                    email, otp
                });
                
                if (response.success) {
                    showAlert('alertMsg', 'OTP Verified!', 'success');
                    setTimeout(() => {
                        window.location.href = 'new_password.html';
                    }, 1000);
                } else {
                    showAlert('alertMsg', response.message || 'Invalid OTP.', 'error');
                    btn.textContent = 'Verify';
                    btn.disabled = false;
                }
            } catch (error) {
                showAlert('alertMsg', error.message || 'Server error verifying OTP.', 'error');
                btn.textContent = 'Verify';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
